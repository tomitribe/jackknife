<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- OPTION C: Brand top-left anchor, problem dominates center, solution as footer bar -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Top bar: brand -->
  <rect x="0" y="0" width="1200" height="80" fill="rgba(255,255,255,0.03)"/>
  <rect x="0" y="0" width="1200" height="3" fill="#e57125"/>
  <text x="60" y="52" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="30" fill="#e57125">Jackknife</text>
  <text x="280" y="52" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="18" fill="#64748b">by Tomitribe</text>

  <!-- Problem — huge, fills the middle -->
  <text x="600" y="280" font-family="Inter, system-ui, sans-serif" font-weight="300" font-size="80" fill="#94a3b8" text-anchor="middle">Claude searching</text>
  <text x="600" y="380" font-family="Inter, system-ui, sans-serif" font-weight="300" font-size="80" fill="#e2e8f0" text-anchor="middle">~/.m2 again?</text>

  <!-- Bottom bar: solution -->
  <rect x="0" y="500" width="1200" height="130" fill="#e57125"/>
  <text x="600" y="580" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="44" fill="#ffffff" text-anchor="middle">Stop approving. Start building.</text>
</svg>
