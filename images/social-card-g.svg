<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- OPTION G: Two-tone horizontal — problem on navy left, solution on orange right -->
  <rect width="600" height="630" fill="#0f172a"/>
  <rect x="600" y="0" width="600" height="630" fill="#e57125"/>

  <!-- Problem — left side -->
  <text x="60" y="220" font-family="Inter, system-ui, sans-serif" font-weight="300" font-size="46" fill="#94a3b8">Claude</text>
  <text x="60" y="290" font-family="Inter, system-ui, sans-serif" font-weight="300" font-size="46" fill="#94a3b8">searching</text>
  <text x="60" y="360" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="46" fill="#e2e8f0">~/.m2</text>
  <text x="60" y="430" font-family="Inter, system-ui, sans-serif" font-weight="300" font-size="46" fill="#94a3b8">again?</text>

  <!-- Solution — right side -->
  <text x="660" y="250" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="46" fill="#ffffff">Stop</text>
  <text x="660" y="310" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="46" fill="#ffffff">approving.</text>
  <text x="660" y="400" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="46" fill="#ffffff">Start</text>
  <text x="660" y="460" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="46" fill="#ffffff">building.</text>

  <!-- Brand — bottom left -->
  <text x="60" y="570" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="32" fill="#e57125">Jackknife</text>
  <text x="310" y="570" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="16" fill="#64748b">by Tomitribe</text>

  <!-- Brand echo — bottom right -->
  <text x="660" y="570" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="18" fill="rgba(255,255,255,0.5)">tomitribe.github.io/jackknife</text>
</svg>
